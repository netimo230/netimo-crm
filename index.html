<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nétimo — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --card: #151821;
    --card2: #1c2030;
    --border: #252a38;
    --accent: #4f8eff;
    --accent2: #00e5c0;
    --danger: #ff4f6a;
    --warn: #ffb347;
    --text: #e8eaf0;
    --muted: #7a819a;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

  header {
    background: linear-gradient(135deg, #0d0f14 0%, #141928 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .logo span { font-weight: 400; opacity: 0.7; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .stat-pill { background: var(--card2); border: 1px solid var(--border); border-radius: 30px; padding: 5px 12px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .stat-pill b { color: var(--text); font-size: 13px; }

  .sync-btn { background: var(--card2); border: 1px solid var(--border); border-radius: 30px; padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .sync-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .sync-btn.syncing svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  input[type="text"], input[type="tel"], select, textarea { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 14px; outline: none; width: 100%; transition: border-color 0.2s; }
  input[type="text"]:focus, input[type="tel"]:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .search-input { padding-left: 38px !important; }
  select option { background: var(--card); }

  .btn { border: none; border-radius: var(--radius); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 11px 18px; transition: all 0.18s; display: flex; align-items: center; gap: 7px; white-space: nowrap; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #3a78f0); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,142,255,0.3); }
  .btn-ghost { background: var(--card2); border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(255,79,106,0.12); border: 1px solid rgba(255,79,106,0.3); color: var(--danger); }
  .btn-danger:hover { background: rgba(255,79,106,0.22); }
  .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 9px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .filter-btn { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--card2); }
  th { padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.6px; text-transform: uppercase; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--text); }
  td { padding: 13px 14px; font-size: 13px; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .company-name { font-weight: 600; font-size: 14px; color: var(--text); }
  .contact-name { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .tel-link { color: var(--accent2); text-decoration: none; font-size: 13px; }

  .badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 600; }
  .badge-yes { background: rgba(0,229,192,0.12); color: var(--accent2); border: 1px solid rgba(0,229,192,0.25); }
  .badge-no  { background: rgba(255,79,106,0.1);  color: var(--danger);  border: 1px solid rgba(255,79,106,0.2); }
  .badge-wip { background: rgba(255,179,71,0.12); color: var(--warn);    border: 1px solid rgba(255,179,71,0.25); }

  .badge-called    { background: rgba(79,142,255,0.12); color: var(--accent);  border: 1px solid rgba(79,142,255,0.25); }
  .badge-notcalled { background: rgba(122,129,154,0.1); color: var(--muted);   border: 1px solid rgba(122,129,154,0.2); }
  .toggle-opt.sel-called { background: rgba(79,142,255,0.12); border-color: var(--accent); color: var(--accent); }
  .date-cell { font-size: 11px; color: var(--muted); white-space: nowrap; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty svg { margin-bottom: 14px; opacity: 0.4; }
  .empty h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 6px; color: var(--text); }

  /* LOADING */
  .loading-bar { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); position: fixed; top: 0; left: 0; width: 0%; z-index: 999; transition: width 0.3s; border-radius: 2px; }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: 24px 20px 36px; transform: translateY(40px); transition: transform 0.25s cubic-bezier(.22,1,.36,1); }
  @media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } .modal { border-radius: 20px; } }
  .overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
  .close-btn { background: var(--card2); border: 1px solid var(--border); border-radius: 50%; width: 34px; height: 34px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.15s; }
  .close-btn:hover { color: var(--text); border-color: var(--accent); }
  .form-grid { display: grid; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .toggle-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .toggle-opt { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; cursor: pointer; font-size: 12px; color: var(--muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .toggle-opt.sel-yes { background: rgba(0,229,192,0.12); border-color: var(--accent2); color: var(--accent2); }
  .toggle-opt.sel-no  { background: rgba(255,79,106,0.1);  border-color: var(--danger);  color: var(--danger); }
  .toggle-opt.sel-wip { background: rgba(255,179,71,0.12); border-color: var(--warn);    color: var(--warn); }
  .modal-footer { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
  textarea { resize: vertical; min-height: 80px; }
  .results-count { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card2); border: 1px solid var(--accent); border-radius: 30px; padding: 12px 22px; font-size: 13px; color: var(--text); z-index: 999; transition: transform 0.3s cubic-bezier(.22,1,.36,1); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) { .hide-mobile { display: none; } td, th { padding: 10px 10px; } .logo { font-size: 18px; } }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div class="logo">Nét<span>imo</span> CRM</div>
  <div class="header-right">
    <div class="stat-pill">Clients : <b id="totalCount">—</b></div>
    <div class="stat-pill" style="color:var(--accent2)">Faits : <b id="doneCount" style="color:var(--accent2)">—</b></div>
    <button class="sync-btn" id="syncBtn" onclick="loadClients()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Sync
    </button>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Rechercher entreprise, contact…">
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Ajouter
    </button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('site_oui', this)">✅ Site Nétimo fait</button>
    <button class="filter-btn" onclick="setFilter('site_non', this)">⏳ Site à faire</button>
    <button class="filter-btn" onclick="setFilter('has_site', this)">🌐 Déjà un site</button>
    <button class="filter-btn" onclick="setFilter('no_site', this)">🚫 Pas de site</button>
    <button class="filter-btn" onclick="setFilter('called', this)">📞 Appelés</button>
    <button class="filter-btn" onclick="setFilter('not_called', this)">⏳ Non appelés</button>
  </div>

  <div class="results-count" id="resultsCount"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('company')">Entreprise ↕</th>
          <th class="hide-mobile" onclick="sortBy('name')">Contact ↕</th>
          <th class="hide-mobile">Téléphone</th>
          <th>Site Nétimo</th>
          <th class="hide-mobile">Site existant</th>
          <th>Appelé</th>
          <th onclick="sortBy('createdAt')" title="Trier par date">Date ↕</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
      <h3>Aucun client trouvé</h3>
      <p style="font-size:13px;margin-top:4px">Ajoutez votre premier client avec le bouton +</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nouveau client</div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <div class="form-group">
          <label>Nom de l'entreprise *</label>
          <input type="text" id="f_company" placeholder="ex: Plomberie Dupont">
        </div>
        <div class="form-group">
          <label>Nom du contact</label>
          <input type="text" id="f_name" placeholder="ex: Jean Dupont (optionnel)">
        </div>
      </div>
      <div class="form-group">
        <label>Numéro de téléphone</label>
        <input type="tel" id="f_tel" placeholder="06 12 34 56 78">
      </div>
      <div class="form-group">
        <label>Site Nétimo — Statut</label>
        <div class="toggle-group">
          <div class="toggle-opt" id="opt_wip" onclick="selectStatus('wip')">⏳ En cours</div>
          <div class="toggle-opt" id="opt_yes" onclick="selectStatus('yes')">✅ Terminé</div>
          <div class="toggle-opt" id="opt_no"  onclick="selectStatus('no')">🔲 À faire</div>
        </div>
      </div>
      <div class="form-group">
        <label>Le client a déjà un site web ?</label>
        <div class="toggle-group" style="grid-template-columns:1fr 1fr">
          <div class="toggle-opt" id="opt_has_yes" onclick="selectHasSite('yes')">🌐 Oui</div>
          <div class="toggle-opt" id="opt_has_no"  onclick="selectHasSite('no')">🚫 Non</div>
        </div>
      </div>
      <div class="form-group">
        <label>Appelé ?</label>
        <div class="toggle-group" style="grid-template-columns:1fr 1fr">
          <div class="toggle-opt" id="opt_called_yes" onclick="selectCalled('yes')">📞 Oui</div>
          <div class="toggle-opt" id="opt_called_no"  onclick="selectCalled('no')">⏳ Pas encore</div>
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="f_notes" placeholder="Informations supplémentaires…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveClient()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat = fonctionne sans npm, directement dans le navigateur) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  // ── CONFIG FIREBASE ──────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyArVt5QPC1mE4l27lOngHYpF_Pjz_KlDqQ",
    authDomain: "netimo-crm-2fecc.firebaseapp.com",
    databaseURL: "https://netimo-crm-2fecc-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "netimo-crm-2fecc",
    storageBucket: "netimo-crm-2fecc.firebasestorage.app",
    messagingSenderId: "430065822991",
    appId: "1:430065822991:web:938a655fdd36d31747627a"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const colRef = db.collection("clients");
  // ─────────────────────────────────────────────────────────────

  let clients = [];
  let editId = null;
  let currentFilter = 'all';
  let currentSort = { key: 'createdAt', asc: false };
  let selectedStatus = 'no';
  let selectedHasSite = 'no';
  let selectedCalled = 'no';

  // ---- CHARGEMENT MANUEL ----
  async function loadClients() {
    setLoading(true);
    try {
      const snapshot = await colRef.get();
      clients = snapshot.docs.map(doc => {
        const d = doc.data();
        const createdAt = d.createdAt?.toMillis ? d.createdAt.toMillis() : (d.createdAt || null);
        return { id: doc.id, ...d, createdAt };
      });
      render();
      showToast('✅ Données synchronisées');
    } catch(e) {
      console.error(e);
      showToast('❌ Erreur de connexion');
    }
    setLoading(false);
  }

  function setLoading(on) {
    const bar = document.getElementById('loadingBar');
    const btn = document.getElementById('syncBtn');
    bar.style.width = on ? '80%' : '100%';
    btn.classList.toggle('syncing', on);
    if (!on) setTimeout(() => bar.style.width = '0%', 400);
  }

  // ---- RENDER ----
  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let list = clients.filter(c => {
      const match = (c.company||'').toLowerCase().includes(q) ||
                    (c.name||'').toLowerCase().includes(q) ||
                    (c.tel||'').includes(q);
      if (!match) return false;
      if (currentFilter === 'site_oui')   return c.status === 'yes';
      if (currentFilter === 'site_non')   return c.status !== 'yes';
      if (currentFilter === 'has_site')   return c.hasSite === 'yes';
      if (currentFilter === 'no_site')    return c.hasSite === 'no';
      if (currentFilter === 'called')     return c.called === 'yes';
      if (currentFilter === 'not_called') return c.called !== 'yes';
      return true;
    });

    list.sort((a, b) => {
      if (currentSort.key === 'createdAt') {
        const ta = a.createdAt || 0;
        const tb = b.createdAt || 0;
        return currentSort.asc ? ta - tb : tb - ta;
      }
      let va = (a[currentSort.key]||'').toLowerCase();
      let vb = (b[currentSort.key]||'').toLowerCase();
      return currentSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    });

    document.getElementById('totalCount').textContent = clients.length;
    document.getElementById('doneCount').textContent = clients.filter(c => c.status === 'yes').length;
    document.getElementById('resultsCount').textContent = `${list.length} client${list.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');

    if (list.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    tbody.innerHTML = list.map(c => `
      <tr>
        <td>
          <div class="company-name">${esc(c.company)}</div>
          <div class="contact-name hide-pc">${esc(c.name)}</div>
        </td>
        <td class="hide-mobile">${esc(c.name)}</td>
        <td class="hide-mobile">
          ${c.tel ? `<a class="tel-link" href="tel:${c.tel}">${esc(c.tel)}</a>` : '<span style="color:var(--muted)">—</span>'}
        </td>
        <td>${statusBadge(c.status)}</td>
        <td class="hide-mobile">${hasSiteBadge(c.hasSite)}</td>
        <td>${calledBadge(c.called)}</td>
        <td class="hide-mobile date-cell">${formatDate(c.createdAt)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="openEdit('${c.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')">🗑</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function statusBadge(s) {
    if (s === 'yes') return '<span class="badge badge-yes">✅ Fait</span>';
    if (s === 'wip') return '<span class="badge badge-wip">⏳ En cours</span>';
    return '<span class="badge badge-no">🔲 À faire</span>';
  }

  function calledBadge(s) {
    if (s === 'yes') return '<span class="badge badge-called">📞 Oui</span>';
    return '<span class="badge badge-notcalled">⏳ Non</span>';
  }

  function formatDate(ts) {
    if (!ts) return '<span style="color:var(--muted)">—</span>';
    const d = new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}<br><span style="font-size:10px;opacity:0.6">${pad(d.getHours())}:${pad(d.getMinutes())}</span>`;
  }

  function hasSiteBadge(s) {
    if (s === 'yes') return '<span class="badge badge-yes">🌐 Oui</span>';
    if (s === 'no')  return '<span class="badge badge-no">🚫 Non</span>';
    return '<span style="color:var(--muted);font-size:12px">—</span>';
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- FILTER / SORT ----
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function sortBy(key) {
    if (currentSort.key === key) currentSort.asc = !currentSort.asc;
    else { currentSort.key = key; currentSort.asc = true; }
    render();
  }

  // ---- MODAL ----
  function openModal() {
    editId = null;
    selectedStatus = 'no';
    selectedHasSite = 'no';
    selectedCalled = 'no';
    document.getElementById('modalTitle').textContent = 'Nouveau client';
    document.getElementById('f_company').value = '';
    document.getElementById('f_name').value = '';
    document.getElementById('f_tel').value = '';
    document.getElementById('f_notes').value = '';
    refreshToggles();
    document.getElementById('overlay').classList.add('open');
  }

  function openEdit(id) {
    const c = clients.find(x => x.id == id);
    if (!c) return;
    editId = id;
    selectedStatus = c.status || 'no';
    selectedHasSite = c.hasSite || 'no';
    selectedCalled = c.called || 'no';
    document.getElementById('modalTitle').textContent = 'Modifier client';
    document.getElementById('f_company').value = c.company || '';
    document.getElementById('f_name').value = c.name || '';
    document.getElementById('f_tel').value = c.tel || '';
    document.getElementById('f_notes').value = c.notes || '';
    refreshToggles();
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function maybeClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  function selectStatus(v) { selectedStatus = v; refreshToggles(); }
  function selectHasSite(v) { selectedHasSite = v; refreshToggles(); }
  function selectCalled(v) { selectedCalled = v; refreshToggles(); }

  function refreshToggles() {
    ['yes','no','wip'].forEach(v => {
      const el = document.getElementById('opt_' + v);
      el.className = 'toggle-opt' + (selectedStatus === v ? ' sel-' + v : '');
    });
    ['yes','no'].forEach(v => {
      const el = document.getElementById('opt_has_' + v);
      el.className = 'toggle-opt' + (selectedHasSite === v ? ' sel-' + v : '');
    });
    ['yes','no'].forEach(v => {
      const el = document.getElementById('opt_called_' + v);
      el.className = 'toggle-opt' + (selectedCalled === v ? (v === 'yes' ? ' sel-called' : ' sel-no') : '');
    });
  }

  // ---- SAVE ----
  async function saveClient() {
    const company = document.getElementById('f_company').value.trim();
    const name    = document.getElementById('f_name').value.trim();
    if (!company) { showToast('⚠️ Renseignez au moins le nom de l\'entreprise'); return; }

    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Enregistrement…';
    btn.disabled = true;

    const data = {
      company, name,
      tel:     document.getElementById('f_tel').value.trim(),
      notes:   document.getElementById('f_notes').value.trim(),
      status:  selectedStatus || 'no',
      hasSite: selectedHasSite || 'no',
      called:  selectedCalled || 'no',
    };

    try {
      if (editId) {
        await colRef.doc(editId).update(data);
        showToast('✅ Client modifié');
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await colRef.add(data);
        showToast('✅ Client ajouté');
      }
      closeModal();
      loadClients();
    } catch(e) {
      console.error(e);
      showToast('❌ Erreur : ' + e.message);
    }

    btn.textContent = 'Enregistrer';
    btn.disabled = false;
  }

  // ---- DELETE ----
  async function deleteClient(id) {
    if (!confirm('Supprimer ce client ?')) return;
    try {
      await colRef.doc(id).delete();
      showToast('🗑️ Client supprimé');
      loadClients();
    } catch(e) {
      showToast('❌ Erreur lors de la suppression');
    }
  }

  // ---- TOAST ----
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ---- INIT ----
  document.getElementById('searchInput').addEventListener('input', render);
  loadClients();
</script>
</body>
</html>
